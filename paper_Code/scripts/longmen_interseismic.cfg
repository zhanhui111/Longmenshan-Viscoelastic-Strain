[pylithapp.metadata]
# Materials
#   The 'wedge' and 'crust' blocks use the the linear, isotropic
#   elastic material model, whereas the 'slab' and 'mantle' use the
#   linear Maxwell viscoelastic material model (mat_viscoelastic.cfg).
#
# Boundary Conditions
#   Roller boundary conditions (pylithapp.cfg).
#
# Fault
#   Uniform creep on the bottom of the slab.
#   Uniform creep on the deeper portion of the subduction interface.
base = [pylithapp.cfg, mat_viscoelastic.cfg]
description = Interseismic deformation, combining aseismic slip on the top and bottom of the subducting slab with viscoelastic relaxation in the mantle and deep part of the slab.
keywords = [prescribed slip, aseismic creep]
arguments = [step03_interseismic.cfg, mat_viscoelastic.cfg]
version = 2.0.0

features = [
    pylith.materials.Elasticity,
    pylith.materials.IsotropicLinearElasticity,
    pylith.materials.IsotropicLinearMaxwell,
    spatialdata.spatialdb.CompositeDB,
    spatialdata.spatialdb.SimpleDB,
    spatialdata.spatialdb.SimpleGridDB,
    Quasi-static simulation,
    pylith.faults.KinSrcConstRate
    ]

# ----------------------------------------------------------------------
# Output of parameters used and simulation progress.
# ----------------------------------------------------------------------
[pylithapp]
dump_parameters.filename = output/step03_interseismic-parameters.json
problem.progress_monitor.filename = output/step03_interseismic-progress.txt

# Set the name of the problem that will be used to construct the
# output filenames. The default directory for output is 'output'.
problem.defaults.name = step03_interseismic

# ----------------------------------------------------------------------
# problem
# ----------------------------------------------------------------------
[pylithapp.problem]
# Define the total time for the simulation, the start time, and the
# initial time step size.
initial_dt = 10.0*year
start_time = -1.0*year
end_time = 11999*year



# ----------------------------------------------------------------------
# solution
# ----------------------------------------------------------------------
[pylithapp.problem]
# Set the discretization and integration for each of the solution subfields.
#
# IMPORTANT: The quadrature order *must* the same for all solution and
# auxiliary subfields. PyLith will verify that this requirement is met.
# This requirement may be relaxed in the future.
#
# For a quastistatic simulation with a fault, we have two solution fields:
# (1) displacement and (2) Lagrange multiplier. We use a predefined containter
# to create a solution field with these two subfields.
solution = pylith.problems.SolnDispLagrange


[pylithapp.problem.solution.subfields]
displacement.basis_order = 1
lagrange_multiplier_fault.basis_order = 1

# ----------------------------------------------------------------------
# faults
# ----------------------------------------------------------------------
[pylithapp.problem]
solution_observers = [domain, groundsurf, gps_stations , poumian]
solution_observers.gps_stations = pylith.meshio.OutputSolnPoints
solution_observers.groundsurf = pylith.meshio.OutputSolnBoundary
solution_observers.poumian = pylith.meshio.OutputSolnPoints

[pylithapp.problem.solution_observers.domain]
trigger.num_skip = 1
# data_fields = [displacement, velocity]

[pylithapp.problem.solution_observers.groundsurf]
label = boundary_zpos
trigger.num_skip = 1
# data_fields = [displacement, velocity]

[pylithapp.problem.solution_observers.gps_stations]
# The label is combined with the simulation name to provide a default name for output files.
label = gps_stations
reader=pylith.meshio.PointsList
reader.filename = GNSS_Stations_vertical.txt
reader.coordsys.space_dim = 3

[pylithapp.problem.solution_observers.poumian]
# The label is combined with the simulation name to provide a default name for output files.
label = poumian
reader=pylith.meshio.PointsList
reader.filename = profile_coordinates_1200.txt
reader.coordsys.space_dim = 3




# We prescribe slip on the top and bottom of the slab.
[pylithapp.problem]
interfaces = [
              fault_Longmen_D15
             ]

# # # # ----------------------------------------------------------
[pylithapp.problem.interfaces.fault_Longmen_D15]
label = fault_Longmen_D15
edge = fault_Longmen_D15_edge

observers.observer.data_fields = [slip, traction_change]

# Use the constant slip rate time function.
eq_ruptures.rupture = pylith.faults.KinSrcConstRate


#[pylithapp.problem.interfaces.fault_Longmen_D15.eq_ruptures.rupture]
#db_auxiliary_field = spatialdata.spatialdb.SimpleGridDB
#db_auxiliary_field.description = coseismic_slab bottom slip rate.
#db_auxiliary_field.filename = fault_creep_Longmen.spatialdb
#db_auxiliary_field.query_type = nearest

[pylithapp.problem.interfaces.fault_Longmen_D15.eq_ruptures.rupture]
db_auxiliary_field = spatialdata.spatialdb.SimpleDB
db_auxiliary_field.description = Along-strike tapered backslip
db_auxiliary_field.iohandler.filename = fault_backslip_alongstrike_linear_datadim2_m.spatialdb
db_auxiliary_field.query_type = nearest

# ----------------------------------------------------------------------

# End of file
